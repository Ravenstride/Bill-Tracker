<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#020b15">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RavenBill 2.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>RavenBill 2.0</title>
  <link rel="manifest" href="/manifest.webmanifest?v=42">
  <link rel="icon" href="/rb-icon.svg?v=42" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/rb-icon.svg?v=42">
  <style>
    html,body{margin:0;min-height:100%;background:#020b15;color:#f7f9fc;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    .loading{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
    .loading strong{font-family:Georgia,"Times New Roman",serif;font-size:30px}.loading strong span{color:#0f7fff}.loading small{display:block;margin-top:10px;color:#8fa2b6}
  </style>
</head>
<body>
  <div class="loading"><div><strong>RAVEN<span>BILL</span> 2.0</strong><small>Loading your bill tracker…</small></div></div>
  <script>
    (async () => {
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith('ravenbill')).map((key) => caches.delete(key)));
        }

        const response = await fetch('/index.html?application=1&version=42', { cache: 'no-store' });
        if (!response.ok) throw new Error(`Could not load RavenBill (${response.status})`);
        let source = await response.text();

        const autopayPattern = /function priorAmount\(templateId,date\)\{[\s\S]*?\}function ensureMonth\(date=selected,force=false\)\{[\s\S]*?\}function bills\(\)/;
        const autopayReplacement = `function sameRecurringBill(a,b){if(!a||!b)return false;if(a.sourceTemplateId&&b.sourceTemplateId&&a.sourceTemplateId===b.sourceTemplateId)return true;if(a.id&&b.sourceTemplateId&&a.id===b.sourceTemplateId)return true;if(b.id&&a.sourceTemplateId&&b.id===a.sourceTemplateId)return true;return String(a.name||"").trim().toLowerCase()===String(b.name||"").trim().toLowerCase()&&Number(a.dueDay)===Number(b.dueDay)&&String(a.category||"")===String(b.category||"")&&String(a.frequency||"monthly")===String(b.frequency||"monthly")}
        function priorAutopayRecord(seed,date){let nearestCarried=null;for(let i=1;i<=36;i++){const priorDate=shiftMonth(date,-i),m=state.months[monthKey(priorDate)],match=m?.bills?.find(x=>sameRecurringBill(x,seed)&&x.autopay&&Number(x.amount)>0);if(!match)continue;const record={bill:match,key:monthKey(priorDate)};if(!match._autopayCarried)return record;if(!nearestCarried)nearestCarried=record}return nearestCarried}
        function makeMonthBill(template,date){const prior=priorAutopayRecord(template,date),autopay=Boolean(template.autopay||prior?.bill?.autopay),carriedAmount=prior&&Number(prior.bill.amount)>0?Number(prior.bill.amount):null;return{...template,id:uuid(),sourceTemplateId:template.id,autopay,amount:autopay&&carriedAmount!==null?carriedAmount:Number(template.amount||0),paid:false,paidAt:null,_autopayCarried:Boolean(autopay&&carriedAmount!==null),_autopaySource:prior?.key||null}}
        function ensureMonth(date=selected,force=false){const k=monthKey(date),activeTemplates=state.template.filter(t=>t.frequency==="monthly"||(t.frequency==="yearly"&&Number(t.yearlyMonth)===date.getMonth()));if(!state.months[k]||force){state.months[k]={createdAt:new Date().toISOString(),bills:activeTemplates.map(t=>makeMonthBill(t,date))};save();return state.months[k]}const month=state.months[k];let changed=false;activeTemplates.forEach(template=>{let bill=month.bills.find(x=>sameRecurringBill(x,template));if(!bill){month.bills.push(makeMonthBill(template,date));changed=true;return}const prior=priorAutopayRecord(template,date),shouldAutopay=Boolean(bill.autopay||template.autopay||prior?.bill?.autopay);if(shouldAutopay&&!bill.autopay){bill.autopay=true;changed=true}if(shouldAutopay&&prior?.bill&&Number(prior.bill.amount)>0){const nextAmount=Number(prior.bill.amount),currentAmount=Number(bill.amount),mayRefresh=!Number.isFinite(currentAmount)||currentAmount===0||bill._autopayCarried===true;if(mayRefresh&&currentAmount!==nextAmount){bill.amount=nextAmount;changed=true}if(mayRefresh&&bill._autopayCarried!==true){bill._autopayCarried=true;changed=true}if(mayRefresh&&bill._autopaySource!==prior.key){bill._autopaySource=prior.key;changed=true}}});if(changed)save();return month}function bills()`;
        if (autopayPattern.test(source)) source = source.replace(autopayPattern, autopayReplacement);

        const doc = new DOMParser().parseFromString(source, 'text/html');
        doc.title = 'RavenBill 2.0';

        doc.querySelectorAll('.brand img, .brand-raven, .raven-quote img, .quote img').forEach((image) => image.remove());
        doc.querySelectorAll('img').forEach((image) => {
          const src = image.getAttribute('src') || '';
          const inDesktopBrand = image.closest('.sidebar .brand, .sidebar .quote, .sidebar .raven-quote');
          if (inDesktopBrand || /raven-logo|ravenbill-mobile-icon|ravenbill-2-icon/i.test(src)) image.remove();
        });

        const brand = doc.querySelector('.brand');
        if (brand) {
          brand.querySelectorAll('img,picture,svg').forEach((node) => node.remove());
          let wordmark = brand.querySelector('.brand-name, .brand-word, .wordmark');
          if (!wordmark) {
            wordmark = doc.createElement('span');
            wordmark.className = 'brand-name';
            brand.prepend(wordmark);
          }
          wordmark.innerHTML = 'RAVEN<span>BILL</span><sup>2.0</sup>';
          let subtitle = brand.querySelector('small');
          if (!subtitle) {
            subtitle = doc.createElement('small');
            brand.appendChild(subtitle);
          }
          subtitle.textContent = 'BILL TRACKER';
        }

        doc.querySelectorAll('.mobile-head img, .mobile-brand img').forEach((image) => {
          image.src = '/rb-icon.svg?v=42';
          image.alt = 'RB';
        });

        doc.querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]').forEach((link) => {
          link.href = '/rb-icon.svg?v=42';
          link.type = 'image/svg+xml';
        });

        let appleTitle = doc.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (!appleTitle) {
          appleTitle = doc.createElement('meta');
          appleTitle.name = 'apple-mobile-web-app-title';
          doc.head.appendChild(appleTitle);
        }
        appleTitle.content = 'RavenBill 2.0';

        const manifest = doc.querySelector('link[rel="manifest"]');
        if (manifest) manifest.href = '/manifest.webmanifest?v=42';

        const forcedStyle = doc.createElement('style');
        forcedStyle.textContent = `
          .sidebar .brand > img,
          .sidebar .brand picture,
          .sidebar .brand svg,
          .sidebar .quote img,
          .sidebar .raven-quote img,
          .brand-raven { display:none !important; width:0 !important; height:0 !important; margin:0 !important; padding:0 !important; }
          .sidebar .brand { padding-top:22px !important; padding-bottom:22px !important; min-height:112px !important; align-content:center !important; }
          .sidebar .brand-name,.sidebar .brand-word,.sidebar .wordmark { margin-top:0 !important; }
        `;
        doc.head.appendChild(forcedStyle);

        const html = '<!doctype html>\n' + doc.documentElement.outerHTML
          .replaceAll('/raven-logo.svg?v=30', '/rb-icon.svg?v=42')
          .replaceAll('/raven-logo.svg?v=31', '/rb-icon.svg?v=42')
          .replaceAll('/raven-logo.svg', '/rb-icon.svg?v=42')
          .replaceAll('/ravenbill-mobile-icon.svg', '/rb-icon.svg?v=42')
          .replaceAll('/ravenbill-2-icon.svg', '/rb-icon.svg?v=42');

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = `<div class="loading"><div><strong>RAVEN<span>BILL</span> 2.0</strong><small>${error.message}</small></div></div>`;
      }
    })();
  </script>
</body>
</html>
