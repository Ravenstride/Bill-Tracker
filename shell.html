<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#020b15">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RavenBill 2.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>RavenBill 2.0</title>
  <link rel="manifest" href="/manifest.webmanifest?v=43">
  <link rel="icon" href="/rb-icon.svg?v=43" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/rb-icon.svg?v=43">
  <style>
    html,body{margin:0;min-height:100%;background:#020b15;color:#f7f9fc;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    .loading{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
    .loading strong{font-family:Georgia,"Times New Roman",serif;font-size:30px}.loading strong span{color:#0f7fff}.loading small{display:block;margin-top:10px;color:#8fa2b6}
  </style>
</head>
<body>
  <div class="loading"><div><strong>RAVEN<span>BILL</span> 2.0</strong><small>Loading your bill tracker…</small></div></div>
  <script>
    (async () => {
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith('ravenbill')).map((key) => caches.delete(key)));
        }

        const response = await fetch('/index.html?application=1&version=43', { cache: 'no-store' });
        if (!response.ok) throw new Error(`Could not load RavenBill (${response.status})`);
        let source = await response.text();

        const renderMarker = 'function render(){ensureMonth();';
        const autopayPatch = `function normalizedBillName(value){return String(value||"").trim().toLowerCase().replace(/\\s+/g," ")}
        function sameRecurringBill(a,b){if(!a||!b)return false;if(a.sourceTemplateId&&b.sourceTemplateId&&a.sourceTemplateId===b.sourceTemplateId)return true;if(a.sourceTemplateId&&b.id&&a.sourceTemplateId===b.id)return true;if(b.sourceTemplateId&&a.id&&b.sourceTemplateId===a.id)return true;return normalizedBillName(a.name)===normalizedBillName(b.name)&&Number(a.dueDay)===Number(b.dueDay)&&String(a.category||"")===String(b.category||"")}
        function templateForBill(bill){return state.template.find(t=>sameRecurringBill(t,bill))||null}
        function previousAutopayBill(bill,date){for(let offset=1;offset<=36;offset++){const previousDate=shiftMonth(date,-offset),previousMonth=state.months[monthKey(previousDate)];if(!previousMonth||!Array.isArray(previousMonth.bills))continue;const match=previousMonth.bills.find(candidate=>sameRecurringBill(candidate,bill)&&Number(candidate.amount)>0);if(!match)continue;const template=templateForBill(bill);if(match.autopay||bill.autopay||template?.autopay)return{bill:match,key:monthKey(previousDate)}}return null}
        function reconcileAutopayForSelectedMonth(){const currentMonth=ensureMonth(),currentBills=Array.isArray(currentMonth.bills)?currentMonth.bills:[];let changed=false;currentBills.forEach(bill=>{const template=templateForBill(bill),previous=previousAutopayBill(bill,selected),isAutopay=Boolean(bill.autopay||template?.autopay||previous?.bill?.autopay);if(!isAutopay||!previous?.bill)return;if(!bill.autopay){bill.autopay=true;changed=true}const previousAmount=Number(previous.bill.amount),currentAmount=Number(bill.amount),canCarry=!Number.isFinite(currentAmount)||currentAmount===0||bill._autopayCarried===true;if(canCarry&&previousAmount>0&&currentAmount!==previousAmount){bill.amount=previousAmount;changed=true}if(canCarry&&bill._autopayCarried!==true){bill._autopayCarried=true;changed=true}if(canCarry&&bill._autopaySource!==previous.key){bill._autopaySource=previous.key;changed=true}});if(changed)save()}
        function render(){ensureMonth();reconcileAutopayForSelectedMonth();`;
        if (source.includes(renderMarker)) {
          source = source.replace(renderMarker, autopayPatch);
        } else {
          console.warn('RavenBill autopay render hook was not applied.');
        }

        const doc = new DOMParser().parseFromString(source, 'text/html');
        doc.title = 'RavenBill 2.0';

        doc.querySelectorAll('.brand img, .brand-raven, .raven-quote img, .quote img').forEach((image) => image.remove());
        doc.querySelectorAll('img').forEach((image) => {
          const src = image.getAttribute('src') || '';
          const inDesktopBrand = image.closest('.sidebar .brand, .sidebar .quote, .sidebar .raven-quote');
          if (inDesktopBrand || /raven-logo|ravenbill-mobile-icon|ravenbill-2-icon/i.test(src)) image.remove();
        });

        const brand = doc.querySelector('.brand');
        if (brand) {
          brand.querySelectorAll('img,picture,svg').forEach((node) => node.remove());
          let wordmark = brand.querySelector('.brand-name, .brand-word, .wordmark');
          if (!wordmark) {
            wordmark = doc.createElement('span');
            wordmark.className = 'brand-name';
            brand.prepend(wordmark);
          }
          wordmark.innerHTML = 'RAVEN<span>BILL</span><sup>2.0</sup>';
          let subtitle = brand.querySelector('small');
          if (!subtitle) {
            subtitle = doc.createElement('small');
            brand.appendChild(subtitle);
          }
          subtitle.textContent = 'BILL TRACKER';
        }

        doc.querySelectorAll('.mobile-head img, .mobile-brand img').forEach((image) => {
          image.src = '/rb-icon.svg?v=43';
          image.alt = 'RB';
        });

        doc.querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]').forEach((link) => {
          link.href = '/rb-icon.svg?v=43';
          link.type = 'image/svg+xml';
        });

        let appleTitle = doc.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (!appleTitle) {
          appleTitle = doc.createElement('meta');
          appleTitle.name = 'apple-mobile-web-app-title';
          doc.head.appendChild(appleTitle);
        }
        appleTitle.content = 'RavenBill 2.0';

        const manifest = doc.querySelector('link[rel="manifest"]');
        if (manifest) manifest.href = '/manifest.webmanifest?v=43';

        const forcedStyle = doc.createElement('style');
        forcedStyle.textContent = `
          html,body { max-width:100%; overflow-x:hidden; }
          .sidebar .brand > img,.sidebar .brand picture,.sidebar .brand svg,.sidebar .quote img,.sidebar .raven-quote img,.brand-raven { display:none !important; width:0 !important; height:0 !important; margin:0 !important; padding:0 !important; }
          .sidebar .brand { padding:22px 8px !important; min-height:112px !important; align-content:center !important; }
          .sidebar .brand-name,.sidebar .brand-word,.sidebar .wordmark { margin:0 !important; line-height:1.05 !important; white-space:nowrap; }
          .app-shell { grid-template-columns:210px minmax(0,1fr) 320px !important; width:100%; }
          .main-content,.right-rail,.overview-body,.panel,.bill-row,.rail-bill { min-width:0 !important; }
          .bill-row > div:nth-child(2),.rail-bill > div:nth-child(2) { min-width:0; }
          .bill-row h4,.rail-bill strong { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
          .rail-side { min-width:78px; }
          .rail-status { max-width:100%; white-space:nowrap; }
          .glance-grid > .panel { overflow:hidden; }
          @media (max-width:1180px) {
            .app-shell { grid-template-columns:190px minmax(0,1fr) !important; }
            .right-rail { display:none !important; }
          }
          @media (max-width:820px) {
            .app-shell { display:block !important; }
            .sidebar,.right-rail { display:none !important; }
            .main-content { width:100% !important; padding:72px 12px calc(94px + env(safe-area-inset-bottom)) !important; }
            .overview { grid-template-columns:1fr !important; }
            .overview-metrics { grid-template-columns:repeat(2,1fr) !important; }
            .summary-grid { grid-template-columns:repeat(2,1fr) !important; }
            .glance-grid { grid-template-columns:1fr !important; }
            .category-strip { grid-template-columns:repeat(2,1fr) !important; }
            .bill-grid,.template-grid,.history-grid,.schedule-grid { grid-template-columns:1fr !important; }
          }
        `;
        doc.head.appendChild(forcedStyle);

        const html = '<!doctype html>\n' + doc.documentElement.outerHTML
          .replaceAll('/raven-logo.svg?v=30', '/rb-icon.svg?v=43')
          .replaceAll('/raven-logo.svg?v=31', '/rb-icon.svg?v=43')
          .replaceAll('/raven-logo.svg', '/rb-icon.svg?v=43')
          .replaceAll('/ravenbill-mobile-icon.svg', '/rb-icon.svg?v=43')
          .replaceAll('/ravenbill-2-icon.svg', '/rb-icon.svg?v=43');

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = `<div class="loading"><div><strong>RAVEN<span>BILL</span> 2.0</strong><small>${error.message}</small></div></div>`;
      }
    })();
  </script>
</body>
</html>
