name: Validate RavenBill

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: node --check app.js
      - name: Check required files
        run: test -f index.html && test -f styles.css && test -f manifest.webmanifest && test -f sw.js
