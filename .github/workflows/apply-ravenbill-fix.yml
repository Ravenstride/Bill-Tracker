name: Apply RavenBill repair

on:
  push:
    branches:
      - ravenbill-2.0-clean
    paths:
      - tools/ravenbill-fix.tar.gz.b64

permissions:
  contents: write

jobs:
  apply-repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out clean branch
        uses: actions/checkout@v4
        with:
          ref: ravenbill-2.0-clean
          fetch-depth: 0

      - name: Install repaired application files
        shell: bash
        run: |
          base64 --decode tools/ravenbill-fix.tar.gz.b64 > /tmp/ravenbill-fix.tar.gz
          tar -xzf /tmp/ravenbill-fix.tar.gz -C .
          node --check app.js
          grep -q 'const APP_VERSION = 2' app.js
          grep -q 'ravenbill-clean-v2' sw.js

      - name: Commit repaired files
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app.js styles.css index.html sw.js
          if git diff --cached --quiet; then
            echo 'Application files already match the repair payload.'
            exit 0
          fi
          git commit -m 'Fix recurring bill rollover and dialog footer'
          git push origin HEAD:ravenbill-2.0-clean
