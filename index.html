<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="description" content="RavenBill 2.0 — a private, local-first personal bill tracker.">
  <title>RavenBill 2.0</title>
  <link rel="icon" href="rb-icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="brand" href="#dashboard" data-page="dashboard" aria-label="RavenBill dashboard">
        <span class="brand-mark">RB</span>
        <span class="brand-copy">
          <strong>RAVENBILL 2.0</strong>
          <small>BILL TRACKER</small>
        </span>
      </a>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="dashboard"><span class="nav-icon">⌂</span>Dashboard</button>
        <button class="nav-item" data-page="bills"><span class="nav-icon">▤</span>Bills</button>
        <button class="nav-item" data-page="calendar"><span class="nav-icon">□</span>Calendar</button>
        <button class="nav-item" data-page="history"><span class="nav-icon">↶</span>History</button>
        <button class="nav-item" data-page="reports"><span class="nav-icon">▥</span>Reports</button>
        <button class="nav-item" data-page="settings"><span class="nav-icon">⚙</span>Settings</button>
      </nav>

      <section class="backup-card" id="backupCard">
        <div class="backup-card-title"><span>◇</span> Backup Status</div>
        <div class="backup-status"><span class="status-dot"></span><span id="backupStatusText">Not backed up</span></div>
        <small id="lastBackupText">Create your first backup</small>
        <button class="secondary-button full-width" data-action="backup">⇩ Backup Now</button>
      </section>
    </aside>

    <div class="main-column">
      <header class="topbar">
        <div class="mobile-brand">
          <span class="brand-mark">RB</span>
          <strong>RavenBill 2.0</strong>
        </div>

        <div class="page-heading">
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Your month at a glance</p>
        </div>

        <div class="month-switcher" aria-label="Select month">
          <button class="icon-button" data-action="previous-month" aria-label="Previous month">‹</button>
          <button class="month-label" data-action="choose-month">
            <span>▣</span>
            <span id="selectedMonthLabel">August 2025</span>
            <span class="chevron">⌄</span>
          </button>
          <button class="icon-button" data-action="next-month" aria-label="Next month">›</button>
          <input id="monthPicker" class="visually-hidden" type="month" aria-label="Choose month">
        </div>

        <div class="topbar-actions">
          <label class="search-box" id="globalSearchBox">
            <span>⌕</span>
            <input id="globalSearch" type="search" placeholder="Search bills…" autocomplete="off">
          </label>
          <button class="secondary-button" data-action="toggle-filters">▽ Filter</button>
          <button class="primary-button" data-action="add-bill">＋ Add Bill</button>
        </div>
      </header>

      <main id="app" tabindex="-1"></main>
    </div>

    <aside class="right-rail" id="rightRail" aria-label="Upcoming bills"></aside>
  </div>

  <nav class="mobile-nav" aria-label="Mobile navigation">
    <button class="active" data-page="dashboard"><span>⌂</span>Home</button>
    <button data-page="bills"><span>▤</span>Bills</button>
    <button data-page="calendar"><span>□</span>Calendar</button>
    <button data-page="history"><span>↶</span>History</button>
    <button data-page="settings"><span>•••</span>More</button>
  </nav>

  <aside class="detail-drawer" id="detailDrawer" aria-hidden="true">
    <div class="drawer-header">
      <div id="drawerTitle"></div>
      <button class="icon-button" data-action="close-drawer" aria-label="Close details">×</button>
    </div>
    <div id="drawerContent" class="drawer-content"></div>
  </aside>
  <div class="drawer-scrim" id="drawerScrim" data-action="close-drawer"></div>

  <dialog id="billDialog" class="app-dialog wide-dialog">
    <form method="dialog" id="billForm">
      <header class="dialog-header">
        <div>
          <h2 id="billDialogTitle">Add Bill</h2>
          <p id="billDialogSubtitle">Step 1 of 3</p>
        </div>
        <button type="button" class="icon-button" data-action="close-bill-dialog" aria-label="Close">×</button>
      </header>

      <div class="step-track" aria-label="Bill setup progress">
        <span class="step-dot active" data-step-dot="1">1</span>
        <span class="step-line"></span>
        <span class="step-dot" data-step-dot="2">2</span>
        <span class="step-line"></span>
        <span class="step-dot" data-step-dot="3">3</span>
      </div>

      <section class="dialog-body">
        <div class="form-step active" data-step="1">
          <h3>What type of bill are you adding?</h3>
          <div class="type-grid" id="billTypeGrid">
            <button type="button" class="type-card selected" data-bill-type="standard">
              <span class="type-card-icon">▤</span><strong>Standard Bill</strong><small>Rent, utilities, insurance</small>
            </button>
            <button type="button" class="type-card" data-bill-type="creditCard">
              <span class="type-card-icon">▭</span><strong>Credit Card</strong><small>Card payments and balances</small>
            </button>
            <button type="button" class="type-card" data-bill-type="subscription">
              <span class="type-card-icon">⟳</span><strong>Subscription</strong><small>Streaming, apps, memberships</small>
            </button>
            <button type="button" class="type-card" data-bill-type="loan">
              <span class="type-card-icon">▦</span><strong>Loan</strong><small>Auto, student, personal</small>
            </button>
            <button type="button" class="type-card" data-bill-type="oneTime">
              <span class="type-card-icon">▣</span><strong>One-Time Bill</strong><small>A non-recurring payment</small>
            </button>
          </div>
        </div>

        <div class="form-step" data-step="2">
          <div id="dynamicBillFields"></div>
        </div>

        <div class="form-step" data-step="3">
          <h3>Review and save</h3>
          <div class="review-card" id="billReview"></div>
        </div>
      </section>

      <footer class="dialog-footer">
        <button type="button" class="secondary-button" id="billBackButton" data-action="bill-back">Cancel</button>
        <button type="button" class="primary-button" id="billNextButton" data-action="bill-next">Next</button>
      </footer>
    </form>
  </dialog>

  <dialog id="paymentDialog" class="app-dialog">
    <form method="dialog" id="paymentForm">
      <header class="dialog-header">
        <div>
          <h2>Record Payment</h2>
          <p id="paymentBillName">Bill payment</p>
        </div>
        <button type="button" class="icon-button" data-action="close-payment-dialog" aria-label="Close">×</button>
      </header>
      <section class="dialog-body form-grid">
        <label class="field full">
          <span>Amount paid</span>
          <input id="paymentAmount" name="paymentAmount" inputmode="decimal" required>
        </label>
        <label class="field">
          <span>Date paid</span>
          <input id="paymentDate" name="paymentDate" type="date" required>
        </label>
        <label class="field">
          <span>Confirmation number <em>optional</em></span>
          <input id="paymentConfirmation" name="paymentConfirmation" autocomplete="off">
        </label>
        <label class="field full">
          <span>Note <em>optional</em></span>
          <textarea id="paymentNote" name="paymentNote" rows="3"></textarea>
        </label>
      </section>
      <footer class="dialog-footer">
        <button type="button" class="secondary-button" data-action="close-payment-dialog">Cancel</button>
        <button type="submit" class="primary-button">Save Payment</button>
      </footer>
    </form>
  </dialog>

  <dialog id="filterDialog" class="app-dialog small-dialog">
    <form method="dialog" id="filterForm">
      <header class="dialog-header">
        <div><h2>Filter Bills</h2><p>Show only what you need</p></div>
        <button type="button" class="icon-button" data-action="close-filter-dialog" aria-label="Close">×</button>
      </header>
      <section class="dialog-body form-grid">
        <label class="field full"><span>Status</span>
          <select id="filterStatus">
            <option value="all">All statuses</option>
            <option value="unpaid">Unpaid</option>
            <option value="paid">Paid</option>
            <option value="overdue">Overdue</option>
            <option value="dueSoon">Due soon</option>
          </select>
        </label>
        <label class="field full"><span>Autopay</span>
          <select id="filterAutopay">
            <option value="all">All bills</option>
            <option value="on">Autopay on</option>
            <option value="off">Autopay off</option>
          </select>
        </label>
        <label class="field full"><span>Category</span><select id="filterCategory"></select></label>
      </section>
      <footer class="dialog-footer">
        <button type="button" class="secondary-button" data-action="clear-filters">Clear</button>
        <button type="submit" class="primary-button">Apply</button>
      </footer>
    </form>
  </dialog>

  <input id="restoreFile" type="file" accept="application/json,.json" class="visually-hidden">
  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js" defer></script>
</body>
</html>
