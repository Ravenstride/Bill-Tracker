<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050b14">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <title>Household · Corvus Planner</title>
  <link rel="icon" href="cp-icon.svg" type="image/svg+xml">
  <style>
    :root{color-scheme:dark;--bg:#050b14;--panel:#0d1725;--line:#203047;--muted:#94a3b8;--text:#f8fafc;--purple:#7357f6}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
    .card{width:min(460px,100%);padding:28px;border:1px solid var(--line);border-radius:18px;background:var(--panel);text-align:center}
    h1{margin:0 0 10px;font-size:24px}
    p{margin:0 0 20px;color:var(--muted);line-height:1.6}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:12px 18px;border-radius:12px;background:var(--purple);color:#fff;text-decoration:none;font-weight:800}
  </style>
  <script>location.replace('settings.html#household');</script>
</head>
<body>
  <main class="card">
    <h1>Household settings moved</h1>
    <p>Household membership and sharing are managed securely from Settings.</p>
    <a href="settings.html#household">Open Household Settings</a>
  </main>
</body>
</html>
